<!DOCTYPE html>
<html>
<head>
    <title>Data Center Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 100vh; width: 100%; } body { margin: 0; }</style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([37.8, -96], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        function handleData(data) {
            console.log("Data received via JSONP:", data);
            data.forEach(location => {
                const lat = parseFloat(location.latitude);
                const lng = parseFloat(location.longitude);
                if (!isNaN(lat) && !isNaN(lng)) {
                    L.marker([lat, lng])
                        .addTo(map)
                        .bindPopup(`<b>${location.place_name || 'Point'}</b>`);
                }
            });
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwm5dbxvIRSqPEcjECuzb5oGBP-C5kssSFVhZm7H0_FhiUClYxxkqwJKX0pB104Stzb1w/exec';
        const jsonpScript = document.createElement('script');
        jsonpScript.src = `${scriptURL}?callback=handleData`;
        document.body.appendChild(jsonpScript);
    </script>
</body>
</html>
